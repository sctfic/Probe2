<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Dashboard - Probe2</title>

    <!-- Dependencies -->
    <script src="js/queryManager.js"></script>
    <script src="js/queryManager.js"></script>
    <script src="js/drawing/d3.min.js"></script>
    <script src="js/drawing/plot.umd.js"></script>
    <script src="js/drawing/spiralPlot.js"></script>
    <script src="js/drawing/Plots.js"></script>
    <script src="js/drawing/miniRose.js"></script>
    <script src="js/drawing/Wind.js"></script>
    <script src="js/drawing/miniPlot.js"></script>
    <!-- d3-geo world map -->
    <script src="https://d3js.org/d3-geo.v2.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>

    <style>
        @import url('css/main.css');

        :root {
            --futuristic-cyan: #00ffff;
            --futuristic-cyan-dim: rgba(0, 255, 255, 0.3);
            --futuristic-dark: rgb(26, 26, 26);
            --futuristic-panel: rgba(28, 28, 28, 0.05);
            --futuristic-border: 1px solid rgba(0, 255, 255, 0.2);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--futuristic-dark);
            color: var(--futuristic-cyan);
            font-family: 'Courier New', Courier, monospace;
            /* Monospace for tech feel */
            overflow: hidden;
            display: grid;
            /* grid-template-columns: 300px 1fr 350px; */
            /* pertube l'affichage, limite a 300px la zone visible */
            /* Left panel, Center map, Right panels */
            /* grid-template-rows: 80px 1fr 250px; */
            /* pertube l'affichage, limite a 80px la zone visible */
            /* Header, Main, Bottom panels */
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--futuristic-panel);
            border: var(--futuristic-border);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--futuristic-cyan-dim);
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            border-top: 2px solid var(--futuristic-cyan);
            border-left: 2px solid var(--futuristic-cyan);
        }

        .panel::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-bottom: 2px solid var(--futuristic-cyan);
            border-right: 2px solid var(--futuristic-cyan);
        }

        /* Header Area */
        .header {
            grid-column: 1 / -1;
            grid-row: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Left Column - Gauges / Text Values */
        .left-panel {
            grid-column: 1;
            grid-row: 2 / 4;
            display: grid;
            grid-template-rows: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        /* Center Map Area */
        .center-map {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #world-map {
            width: 100%;
            height: 100%;
        }

        /* Right Column - Plots & Wind Rose */
        .right-top {
            grid-column: 3;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wind-rose-container {
            flex: 1;
        }

        .spiral-container {
            flex: 1.5;
        }

        /* Bottom Row - TimeSeries Plots */
        .bottom-panel {
            grid-column: 2 / 4;
            grid-row: 3;
        }

        /* Value Displays */
        .value-display {
            text-align: center;
            padding: 0 !important;
            position: relative;
            min-height: 80px;
        }

        .value-display .label {
            font-size: 0.8em;
            opacity: 0.7;
            position: absolute;
            top: 5px;
            left: 5px;
            z-index: 2;
        }

        .value-display .value {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px var(--futuristic-cyan), 0 0 10px #000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .value-display .miniplot-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            margin-top: 10px;
            margin-left: 5px;
        }

        /* Custom Scrollbar for left panel if it overflows */
        .left-panel::-webkit-scrollbar {
            width: 4px;
        }

        .left-panel::-webkit-scrollbar-thumb {
            background: var(--futuristic-cyan);
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--futuristic-cyan);
            font-size: 1.2em;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 10px var(--futuristic-cyan);
            }

            100% {
                opacity: 0.5;
            }
        }

        /* Map specific styling */
        .graticule {
            fill: none;
            stroke: rgba(0, 255, 255, 0.1);
            stroke-width: .5px;
        }

        .land {
            fill: rgba(0, 40, 60, 0.8);
            stroke: var(--futuristic-cyan);
            stroke-width: 0.5px;
        }

        .marker {
            fill: #ff0055;
            stroke: #fff;
            stroke-width: 1px;
            cursor: pointer;
        }

        .marker-pulse {
            fill: none;
            stroke: #ff0055;
            stroke-width: 2px;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            0% {
                r: 5;
                opacity: 1;
            }

            100% {
                r: 30;
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="panel header" id="header-panel">
        <div>SYS.CONN: ONLINE</div>
        <div id="station-name">INITIALIZING...</div>
        <div id="sys-time">00:00:00</div>
    </div>

    <!-- Left Panel: Sensor Values -->
    <div class="left-panel" id="values-container">
        <!-- Sensor values will be injected here -->
        <div class="panel value-display loader-holder">
            <div class="loader">LOADING...</div>
        </div>
    </div>

    <!-- Center Panel: World Map -->
    <div class="panel center-map" id="map-container">
        <svg id="world-map"></svg>
        <div id="map-overlay" style="position:absolute; top: 10px; right: 10px; text-align:right;">
            <div id="gps-lat">LAT: --</div>
            <div id="gps-lon">LON: --</div>
            <div id="gps-alt">ALT: --</div>
        </div>
    </div>

    <!-- Right Top: Wind Rose and 3D Spiral -->
    <div class="right-top">
        <div class="panel wind-rose-container" id="wind-rose-container">
            <!-- Mini Rose goes here -->
            <div style="text-align: center; margin-top: 50%;">WIND VECTORS INITIALIZING...</div>
        </div>
        <div class="panel spiral-container" id="spiral-container">
            <!-- 3D Spiral goes here -->
            <div style="text-align: center; margin-top: 50%;">3D PROJECTION INITIALIZING...</div>
        </div>
    </div>

    <!-- Bottom Panel: TimeSeries Plot -->
    <div class="panel bottom-panel" id="timeseries-container">
        <div style="text-align: center; margin-top: 5%;">TIME SERIES MODULE INITIALIZING...</div>
    </div>

    <script>
        // Data Configuration (Dynamic)
        const urlParams = new URLSearchParams(window.location.search);
        const STATION = urlParams.get('station') || 'VP2_Serramoune';
        const API_BASE = '/query';

        let stationConfig = {
            stationId: STATION,
            gps: { latitude: 0, longitude: 0, altitude: 0 }
        };

        // Init Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('sys-time').innerText = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
        }, 1000);

        document.getElementById('station-name').innerText = `STATION_ID: ${STATION}`;

        // Initialize Map
        async function initMap() {
            const svg = d3.select("#world-map");
            const width = svg.node().clientWidth || 800;
            const height = svg.node().clientHeight || 600;

            // Geo projection
            const projection = d3.geoOrthographic()
                .scale(250)
                .translate([width / 2, height / 2])
                .clipAngle(90);

            const path = d3.geoPath().projection(projection);

            try {
                // Using 50m resolution for more detail
                const worldData = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json");
                const countries = topojson.feature(worldData, worldData.objects.countries).features;

                // Rotate to station
                projection.rotate([-stationConfig.gps.longitude, -stationConfig.gps.latitude]);

                const mapGroup = svg.append("g");

                mapGroup.append("path")
                    .datum(d3.geoGraticule()())
                    .attr("class", "graticule")
                    .attr("d", path);

                mapGroup.selectAll(".country")
                    .data(countries)
                    .enter().append("path")
                    .attr("class", "land")
                    .attr("d", path);

                // Draw Marker
                const coords = projection([stationConfig.gps.longitude, stationConfig.gps.latitude]);
                if (coords) {
                    // Pulse
                    mapGroup.append("circle")
                        .attr("cx", coords[0])
                        .attr("cy", coords[1])
                        .attr("r", 5)
                        .attr("class", "marker-pulse");

                    // Center point
                    mapGroup.append("circle")
                        .attr("cx", coords[0])
                        .attr("cy", coords[1])
                        .attr("r", 4)
                        .attr("class", "marker");
                }

                // Zoom and pan behavior
                function zoomed(event) {
                    // Apply the normal zoom transform to the group so it stays under mouse
                    mapGroup.attr("transform", event.transform);
                }

                // Drag behavior for rotation
                let r0, p0;
                function dragstarted(event) {
                    r0 = projection.rotate();
                    p0 = [event.x, event.y];
                }

                function dragged(event) {
                    // Adjust drag sensitivity based on current zoom scale
                    const currentTransform = d3.zoomTransform(svg.node());
                    const scale = currentTransform.k;
                    const sensitivity = 75 / (projection.scale() * scale);
                    
                    const p1 = [event.x, event.y];
                    const r1 = [r0[0] + (p1[0] - p0[0]) * sensitivity, r0[1] - (p1[1] - p0[1]) * sensitivity, r0[2]];

                    // Limit pitch (phi) to prevent flipping
                    r1[1] = Math.max(-90, Math.min(90, r1[1]));

                    projection.rotate(r1);

                    mapGroup.selectAll("path").attr("d", path);
                    const coords = projection([stationConfig.gps.longitude, stationConfig.gps.latitude]);
                    if (coords) {
                        mapGroup.select(".marker").attr("cx", coords[0]).attr("cy", coords[1]);
                        mapGroup.select(".marker-pulse").attr("cx", coords[0]).attr("cy", coords[1]);
                    }
                }

                svg.call(d3.zoom()
                    .scaleExtent([0.5, 10])
                    .on("zoom", zoomed)
                );

                svg.call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                );

                // Auto-rotation based on sun position
                function updateSunRotation() {
                    const now = new Date();
                    const hours = now.getUTCHours();
                    const minutes = now.getUTCMinutes();
                    const seconds = now.getUTCSeconds();
                    const ms = now.getUTCMilliseconds();

                    // Earth rotates 360 degrees in 24 hours.
                    const timeInDays = (hours + minutes / 60 + seconds / 3600 + ms / 3600000) / 24;

                    // Longitude of the sun (subsolar point). At UTC noon, it's 0.
                    const sunLon = (0.5 - timeInDays) * 360;

                    // Day of year for declination
                    const startOfYear = new Date(now.getUTCFullYear(), 0, 0);
                    const diff = now - startOfYear;
                    const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));

                    // Solar declination (approx latitude)
                    const sunLat = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * Math.PI / 180);

                    // Rotate the projection so the sun is centered, simulating earth rotation
                    if (!r0) { // Don't auto-rotate while dragging
                        projection.rotate([-sunLon, -sunLat]);
                        mapGroup.selectAll("path").attr("d", path);
                        const coords = projection([stationConfig.gps.longitude, stationConfig.gps.latitude]);
                        if (coords) {
                            mapGroup.select(".marker").attr("cx", coords[0]).attr("cy", coords[1]);
                            mapGroup.select(".marker-pulse").attr("cx", coords[0]).attr("cy", coords[1]);
                        }
                    }
                }

                // Initial rotation
                updateSunRotation();

                // Keep rotating every frame
                d3.timer(updateSunRotation);

                // Update overlay
                document.getElementById('gps-lat').innerText = `LAT: ${stationConfig.gps.latitude.toFixed(4)}`;
                document.getElementById('gps-lon').innerText = `LON: ${stationConfig.gps.longitude.toFixed(4)}`;
                document.getElementById('gps-alt').innerText = `ALT: ${stationConfig.gps.altitude}m`;

            } catch (e) {
                console.error("Map load failed", e);
            }
        }

        async function initDashboard() {
            try {
                // 1. Fetch Station Config (Settings & GPS)
                const stationRes = await queryManager.query(`/api/station/${STATION}`);
                if (stationRes && stationRes.settings) {
                    const s = stationRes.settings;
                    stationConfig.gps = {
                        latitude: s.latitude.desired || s.latitude.lastReadValue || 0,
                        longitude: s.longitude.desired || s.longitude.lastReadValue || 0,
                        altitude: s.altitude.desired || s.altitude.lastReadValue || 0
                    };
                    document.getElementById('station-name').innerText = `STATION: ${s.name || STATION}`;
                }

                // Initialize Map
                initMap();

                // 2. Fetch all sensor definitions and latest values
                const [conditionsRes, metaRes] = await Promise.all([
                    queryManager.query(`/api/station/${STATION}/current-conditions`),
                    queryManager.query(`${API_BASE}/${STATION}`) // Metadata containing sensors list
                ]);

                if (metaRes && metaRes.success && metaRes.metadata && metaRes.metadata.sensor) {
                    const sensorsList = metaRes.metadata.sensor; 
                    const leftPanel = document.getElementById('values-container');
                    leftPanel.innerHTML = ''; // clear loaders

                    let newHtml = '';

                    sensorsList.forEach(sensorKey => {
                        const def = (conditionsRes && conditionsRes.data) ? conditionsRes.data[sensorKey] : null;

                        let rawValue = def ? def.Value : '--';
                        let valStr = rawValue;
                        let unit = def ? (def.userUnit || '') : '';

                        if (def && def.toUserUnit && rawValue !== '--') {
                            try {
                                const cv = eval(def.toUserUnit);
                                const processed = cv(rawValue);
                                valStr = (typeof processed === 'number') ? processed.toFixed(1) : processed;
                            } catch (e) {
                                console.warn("Conversion failed for", sensorKey, e);
                            }
                        }

                        let label = sensorKey;
                        if (def && def.label) {
                            label = def.label;
                        } else if (sensorKey.includes(':')) {
                            label = sensorKey.split(':')[1].toUpperCase();
                        }

                        const safeId = "miniplot-" + sensorKey.replace(':', '-');

                        newHtml += `
                            <div class="panel value-display">
                                <div id="${safeId}" class="miniplot-container"></div>
                                <div class="label">${label}</div>
                                <div class="value">${valStr} <span style="font-size:0.5em">${unit}</span></div>
                            </div>
                        `;
                    });

                    leftPanel.innerHTML = newHtml;

                    // Load miniPlots for each sensor
                    sensorsList.forEach(sensorKey => {
                        const safeId = "miniplot-" + sensorKey.replace(':', '-');
                        // Use the precise format requested by the user, or dynamic startPlot
                        const startPlot = new Date(Date.now() - 7 * 24 * 3600 * 1000).toISOString();
                        const miniPlotUrl = `${API_BASE}/${STATION}/Raw/${sensorKey}?stepCount=480&startDate=${startPlot}`;
                        
                        if (window.loadData) {
                            window.loadData(safeId, miniPlotUrl, 24 * 3600);
                        }
                    });
                }

                // 3. Other components
                // TimeSeries Plot (Bottom)
                const plotContainer = document.getElementById('timeseries-container');
                const plotUrl = `${API_BASE}/${STATION}/Raws/temperature:outTemp,humidity:outHumidity`;
                if (window.mainPlots) {
                    const endDate = new Date().toISOString();
                    const startDate = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
                    mainPlots(plotContainer, plotUrl, startDate, endDate, 250);
                }

                // Spiral
                const spiralContainer = document.getElementById('spiral-container');
                if (window.loadSpiralePlot) {
                    const spiralUrl = `${API_BASE}/${STATION}/Raw/temperature:outTemp`;
                    loadSpiralePlot(spiralContainer, spiralUrl, 'day');
                }

                // Wind Rose
                if (window.loadRosePlot) {
                    const startDateRose = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
                    window.WIND = { Start: startDateRose, End: new Date().toISOString() };
                    const roseUrl = `${API_BASE}/${STATION}/WindRose?`;
                    loadRosePlot('wind-rose-container', roseUrl);
                }

            } catch (e) {
                console.error("Dashboard Init Error:", e);
            }
        }

        // Wait for fonts/css then init
        window.addEventListener('load', initDashboard);

    </script>
</body>

</html>
