<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Dashboard - Probe2</title>

    <!-- Dependencies -->
    <script src="js/queryManager.js"></script>
    <script src="js/drawing/d3.min.js"></script>
    <script src="js/drawing/plot.umd.js"></script>
    <script src="js/drawing/spiralPlot.js"></script>
    <script src="js/drawing/Plots.js"></script>
    <script src="js/drawing/miniRose.js"></script>
    <script src="js/drawing/Wind.js"></script>
    <script src="js/drawing/miniPlot.js"></script>
    <script src="js/drawing/neonRose.js"></script>
    <script src="js/drawing/worldPosition.js"></script>
    <!-- d3-geo world map -->
    <script src="https://d3js.org/d3-geo.v2.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>

    <style>
        /* @import url('css/main.css'); */

        :root {
            --futuristic-cyan: #00ffff;
            --futuristic-pink: #FF6B6B;
            --futuristic-cyan-dim: rgba(0, 255, 255, 0.3);
            --futuristic-dark: rgb(26, 26, 26);
            --futuristic-panel: rgba(28, 28, 28, 0.05);
            --futuristic-border: 1px solid rgba(0, 255, 255, 0.2);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--futuristic-dark);
            color: var(--futuristic-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;

            display: grid;
            grid-template-areas:
                "header header header"
                "left top right"
                "left middle right"
                "left bottom right";
            grid-template-columns: 350px 1fr 380px;
            grid-template-rows: 60px 140px 1fr 140px;

            gap: 5px;
            padding: 5px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--futuristic-panel);
            border: var(--futuristic-border);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--futuristic-cyan-dim);
            padding: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            border-top: 2px solid var(--futuristic-cyan);
            border-left: 2px solid var(--futuristic-cyan);
        }

        .panel::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-bottom: 2px solid var(--futuristic-cyan);
            border-right: 2px solid var(--futuristic-cyan);
        }

        /* Ratios */
        .vertical-ratio {
            width: 100%;
            aspect-ratio: 2 / 3;
            flex-shrink: 0;
        }

        .horizontal-ratio {
            width: 100%;
            aspect-ratio: 5 / 2;
            flex-shrink: 0;
        }

        .sqare-ratio {
            width: 100%;
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
        }

        /* Grid Areas */
        #header-panel {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5em;
            letter-spacing: 2px;
            text-transform: uppercase;
            flex-direction: row;
        }

        #left-panel {
            grid-area: left;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: -5px;
            padding: 5px;
        }

        #right-panel {
            grid-area: right;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #middle-panel {
            grid-area: middle;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0;
        }

        #top-panel {
            grid-area: top;
            display: flex;
            flex-direction: row;
            gap: 15px;
            overflow-x: auto;
        }

        #bottom-panel {
            grid-area: bottom;
            display: flex;
            flex-direction: row;
            gap: 15px;
            overflow-x: auto;
        }

        #world-map {
            width: 100%;
            height: 100%;
        }

        /* Value Displays */
        .value-display {
            text-align: center;
            padding: 0 !important;
            position: relative;
            min-height: 80px;
        }

        .value-display .label {
            font-size: 0.8em;
            opacity: 0.7;
            position: absolute;
            top: 5px;
            left: 5px;
            z-index: 2;
        }

        .value-display .value {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px var(--futuristic-cyan), 0 0 10px #000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .value-display .miniplot-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            margin-top: 10px;
            margin-left: 5px;
        }

        /* Custom Scrollbar for left panel if it overflows */
        .left-panel::-webkit-scrollbar {
            width: 4px;
        }

        .left-panel::-webkit-scrollbar-thumb {
            background: var(--futuristic-cyan);
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--futuristic-cyan);
            font-size: 1.2em;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 10px var(--futuristic-cyan);
            }

            100% {
                opacity: 0.5;
            }
        }

        /* Map specific styling */
        .graticule {
            fill: none;
            stroke: rgba(0, 255, 255, 0.1);
            stroke-width: .5px;
        }

        .land {
            fill: rgba(0, 40, 60, 0.8);
            stroke: var(--futuristic-cyan);
            stroke-width: 0.5px;
        }

        .marker {
            fill: #ff0055;
            stroke: #fff;
            stroke-width: 1px;
            cursor: pointer;
        }

        .marker-pulse {
            fill: none;
            stroke: #ff0055;
            stroke-width: 2px;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            0% {
                r: 5;
                opacity: 1;
            }

            100% {
                r: 30;
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="panel" id="header-panel">
        <div>SYS.CONN: ONLINE</div>
        <div id="station-name">INITIALIZING...</div>
        <div id="sys-time">00:00:00</div>
    </div>

    <!-- Top Panel -->
    <div class="" id="top-panel">
        <div class="panel value-display horizontal-ratio" id="plot-pressure-wrapper">
            <div id="plot-pressure" class="miniplot-container"></div>
            <div class="label">Pression</div>
            <div class="value">--</div>
        </div>
    </div>

    <!-- Left Panel -->
    <div class="" id="left-panel">
        <div class="panel value-display horizontal-ratio" id="plot-humidity-wrapper">
            <div id="plot-humidity" class="miniplot-container"></div>
            <div class="label">Humidité</div>
            <div class="value">--</div>
        </div>
        <div class="panel value-display horizontal-ratio" id="plot-irradiance-solar-wrapper">
            <div id="plot-irradiance-solar" class="miniplot-container"></div>
            <div class="label">Solaire</div>
            <div class="value">--</div>
        </div>
        <div class="panel value-display horizontal-ratio" id="plot-uv-UV-wrapper">
            <div id="plot-uv-UV" class="miniplot-container"></div>
            <div class="label">UV</div>
            <div class="value">--</div>
        </div>
        <div class="panel value-display horizontal-ratio" id="plot-rain-wrapper">
            <div id="plot-rain" class="miniplot-container"></div>
            <div class="label">Pluie</div>
            <div class="value">--</div>
        </div>
        <div class="panel value-display horizontal-ratio" id="plot-temperature-inTemp-wrapper">
            <div id="plot-temperature-inTemp" class="miniplot-container"></div>
            <div class="label">Temp Int</div>
            <div class="value">--</div>
        </div>
        <div class="panel value-display vertical-ratio" id="plot-temperature-wrapper">
            <div id="plot-temperature" class="miniplot-container"></div>
            <div class="label">Temp Ext</div>
        </div>
    </div>

    <!-- Center/Middle Panel -->
    <div class="panel" id="middle-panel">
        <svg id="world-map"></svg>
        <div id="map-overlay" style="position:absolute; top: 10px; right: 10px; text-align:right;">
            <div id="gps-lat">LAT: --</div>
            <div id="gps-lon">LON: --</div>
            <div id="gps-alt">ALT: --</div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="" id="right-panel">
        <div class="panel value-display sqare-ratio" id="plot-direction" style="height:350px;"></div>
        <div class="panel value-display horizontal-ratio" id="plot-speed-wrapper">
            <div id="plot-speed" class="miniplot-container"></div>
            <div class="label">Vitesse Vent</div>
            <div class="value">--</div>
        </div>
        <div class="panel value-display horizontal-ratio" id="plot-vector-Gust-wrapper">
            <div id="plot-vector-Gust" class="miniplot-container" style="position:relative;width:100%;height:100%;">
            </div>
            <div class="label">Rafales</div>
        </div>
    </div>

    <!-- Bottom Panel -->
    <div class="" id="bottom-panel">
        <div class="panel value-display vertical-ratio" id="plot-soilMoisture-wrapper">
            <div id="plot-soilMoisture" class="miniplot-container"></div>
            <div class="label">Humidité Sol</div>
        </div>
    </div>

    <script>
        // Data Configuration (Dynamic)
        const urlParams = new URLSearchParams(window.location.search);
        const STATION = urlParams.get('station') || 'VP2_Serramoune';
        const API_BASE = '/query';

        let stationConfig = {
            stationId: STATION,
            gps: { latitude: 0, longitude: 0, altitude: 0 }
        };

        // Init Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('sys-time').innerText = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
        }, 1000);

        document.getElementById('station-name').innerText = `STATION_ID: ${STATION}`;

        // Initialize Map

        async function initDashboard() {
            try {
                // 1. Fetch Station Config (Settings & GPS)
                const stationRes = await queryManager.query(`/api/station/${STATION}`);
                if (stationRes && stationRes.settings) {
                    const s = stationRes.settings;
                    stationConfig.gps = {
                        latitude: s.latitude.desired || s.latitude.lastReadValue || 0,
                        longitude: s.longitude.desired || s.longitude.lastReadValue || 0,
                        altitude: s.altitude.desired || s.altitude.lastReadValue || 0
                    };
                    document.getElementById('station-name').innerText = `STATION: ${s.name || STATION}`;
                }

                // Initialize Map
                loadWorldMap("#world-map", stationConfig);

                // 2. Fetch all sensor definitions and latest values
                const [conditionsRes, metaRes] = await Promise.all([
                    queryManager.query(`/api/station/${STATION}/current-conditions`),
                    queryManager.query(`${API_BASE}/${STATION}`) // Metadata containing sensors list
                ]);

                const classification = {
                    "Usage": {
                        "header": { "position": "top & bottom", "drawing": "JS", "data": ["/api/status", "query/:station/Raw"] },
                        "pressure": { "position": "top", "drawing": "miniPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "direction": { "position": "right", "drawing": "panel neonRose", "data": ["current-conditions"] },
                        "speed": { "position": "right", "drawing": "miniPlot.js", "data": ["current-conditions"] },
                        "vector:Gust": { "position": "right", "drawing": "Wind.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "humidity": { "position": "left", "drawing": "miniPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "irradiance:solar": { "position": "left", "drawing": "miniPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "uv:UV": { "position": "left", "drawing": "miniPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "rain": { "position": "left", "drawing": "miniPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "soilMoisture": { "position": "bottom", "drawing": "spiralPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "temperature:inTemp": { "position": "left", "drawing": "miniPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "temperature": { "position": "left", "drawing": "spiralPlot.js", "data": ["current-conditions", "query/:station/Raw"] },
                        "GPS": { "position": "middle", "drawing": "worldPosition.js", "data": ["api/station/:station"] }
                    }
                };

                const startPlot = new Date(Date.now() - 7 * 24 * 3600 * 1000).toISOString();

                if (metaRes && metaRes.success && metaRes.metadata && metaRes.metadata.sensor) {
                    const sensorsList = metaRes.metadata.sensor;
                    const actions = [];

                    sensorsList.forEach(sensorKey => {
                        const def = (conditionsRes && conditionsRes.data) ? conditionsRes.data[sensorKey] : null;

                        let valStr = def ? def.Value : '--';
                        let unit = def ? (def.userUnit || '') : '';

                        if (def && def.toUserUnit && valStr !== '--') {
                            try {
                                valStr = eval(def.toUserUnit)(valStr);
                                if (typeof valStr === 'number') valStr = valStr.toFixed(1);
                            } catch (e) { }
                        }

                        // Update Text Statically
                        const safeId = "plot-" + sensorKey.replace(':', '-');
                        const wrapperElem = document.getElementById(`${safeId}-wrapper`);
                        if (wrapperElem) {
                            const valueNode = wrapperElem.querySelector(".value");
                            if (valueNode) valueNode.innerHTML = `${valStr} <span style="font-size:0.5em">${unit}</span>`;
                        }

                        let baseKey = sensorKey.includes(':') ? sensorKey.split(':')[0] : sensorKey;
                        const usageDef = classification.Usage[sensorKey] || classification.Usage[baseKey];

                        if (usageDef) {
                            const drawerType = usageDef.drawing;
                            const containerId = safeId;

                            actions.push(() => {
                                const containerElem = document.getElementById(containerId);
                                if (!containerElem) return;

                                if (drawerType.includes("miniPlot") && window.loadData) {
                                    const miniPlotUrl = `${API_BASE}/${STATION}/Raw/${sensorKey}?stepCount=480&startDate=${startPlot}`;
                                    loadData(containerId, miniPlotUrl, 24 * 3600);
                                } else if (drawerType.includes("spiralPlot") && window.loadSpiralePlot) {
                                    loadSpiralePlot(containerElem, `${API_BASE}/${STATION}/Raw/${sensorKey}`, 'day');
                                } else if (drawerType.includes("neonRose") && window.loadNeonRose) {
                                    loadNeonRose(containerId, conditionsRes.data);
                                } else if (drawerType.includes("Wind.js")) {
                                    containerElem.innerHTML = "<div style='display:flex;justify-content:center;align-items:center;height:100%;color:#ff009d;'>Wind.js Canvas Here</div>";
                                }
                            });
                        }
                    });

                    setTimeout(() => actions.forEach(fn => fn()), 50);
                }

            } catch (e) {
                console.error("Dashboard Init Error:", e);
            }
        }

        // Wait for fonts/css then init
        window.addEventListener('load', initDashboard);

    </script>
</body>

</html>
