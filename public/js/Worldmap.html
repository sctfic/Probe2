<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Globe 3D - Référentiel Écliptique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --futuristic-cyan: #00ffff;
      --futuristic-magenta: #ff009d;
      --futuristic-pink: #FF6B6B;
      --futuristic-green: #39ff14;
      --futuristic-amber: #ffb347;
      --futuristic-cyan-dim: rgba(0, 255, 255, 0.3);
      --futuristic-dark: rgb(26, 26, 26);
      --futuristic-panel: rgba(26, 26, 26, 0.97);
      --futuristic-border: 1px solid rgba(0, 255, 255, 0.18);
      --font-mono: 'Share Tech Mono', monospace;
      --font-label: 'Rajdhani', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--futuristic-dark);
      overflow: hidden;
      /* Empêche le défilement */
    }

    #globe {
      width: 100vw;
      /* Prend toute la largeur de la page */
      height: 100vh;
      /* Prend toute la hauteur de la page */
      position: absolute;
      top: 0;
      left: 0;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 15px;
      z-index: 100;
      background: var(--futuristic-panel);
      padding: 10px 15px;
      border: var(--futuristic-border);
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(141, 255, 255, 0.1);
    }

    .btn {
      background: transparent;
      color: var(--futuristic-cyan);
      border: 1px solid var(--futuristic-cyan);
      padding: 8px 15px;
      font-family: var(--font-mono);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--futuristic-cyan-dim);
      box-shadow: 0 0 10px var(--futuristic-cyan);
    }

    .btn.active {
      background: var(--futuristic-cyan);
      color: var(--futuristic-dark);
      box-shadow: 0 0 10px var(--futuristic-cyan);
    }
  </style>
</head>

<body>
  <div id="globe"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "./drawing/three.module.min.js"
      }
    }
  </script>
  <script src="./drawing/d3.min.js"></script>
  <script src="./drawing/topojson-client.v3.1.0.min.js"></script>
  <script src="./lib/moment.min.js"></script>
  <script src="./lib/moment-timezone-with-data.min.js"></script>
  <script src="./lib/tz-lookup.js"></script>
  <script src="./composite/sunCalc.js"></script>
  <script type="module" src="./drawing/earthSpaceModel.js"></script>
  <script type="module">
    const model = window.loadEarthSpaceModel(
      document.getElementById('globe'),
      [
        { latitude: 43.20759, longitude: -0.479921, altitude: 150, name: 'VP2' },
        { latitude: -33, longitude: 151, altitude: 20, name: 'Sydney' }
      ],
      new Date()
    );
  </script>
  </script>
</body>

</html>
