<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Globe 3D - Référentiel Écliptique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --futuristic-cyan: #00ffff;
      --futuristic-magenta: #ff009d;
      --futuristic-pink: #FF6B6B;
      --futuristic-green: #39ff14;
      --futuristic-amber: #ffb347;
      --futuristic-cyan-dim: rgba(0, 255, 255, 0.3);
      --futuristic-dark: rgb(26, 26, 26);
      --futuristic-panel: rgba(26, 26, 26, 0.97);
      --futuristic-border: 1px solid rgba(0, 255, 255, 0.18);
      --font-mono: 'Share Tech Mono', monospace;
      --font-label: 'Rajdhani', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--futuristic-dark);
      overflow: hidden;
      /* Empêche le défilement */
    }

    #globe {
      width: 100vw;
      /* Prend toute la largeur de la page */
      height: 100vh;
      /* Prend toute la hauteur de la page */
      position: absolute;
      top: 0;
      left: 0;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 15px;
      z-index: 100;
      background: var(--futuristic-panel);
      padding: 10px 15px;
      border: var(--futuristic-border);
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(141, 255, 255, 0.1);
    }

    .btn {
      background: transparent;
      color: var(--futuristic-cyan);
      border: 1px solid var(--futuristic-cyan);
      padding: 8px 15px;
      font-family: var(--font-mono);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--futuristic-cyan-dim);
      box-shadow: 0 0 10px var(--futuristic-cyan);
    }

    .btn.active {
      background: var(--futuristic-cyan);
      color: var(--futuristic-dark);
      box-shadow: 0 0 10px var(--futuristic-cyan);
    }
  </style>
</head>

<body>
  <div id="globe"></div>

  <div class="control-panel">
    <button id="btn-play" class="btn active">Pause</button>
    <button id="btn-speed" class="btn">Fast</button>
    <button id="btn-fullscreen" class="btn">FullScreen</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "./drawing/three.module.min.js"
      }
    }
  </script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <script type="module" src="./drawing/earthSpaceModel.js"></script>
  <script type="module">
    const model = window.loadEarthSpaceModel(
      document.getElementById('globe'),
      [
        { latitude: 43.37, longitude: -0.62, altitude: 150, name: 'VP2' },
        { latitude: 23.37, longitude: 10.62, altitude: 150, name: 'Garmadon' }
      ],
      new Date()
    );

    const btnPlay = document.getElementById('btn-play');
    const btnSpeed = document.getElementById('btn-speed');
    const btnFullscreen = document.getElementById('btn-fullscreen');

    // Sync button states when drag triggers pause
    model.onStateChange = ({ isPlaying, isFast }) => {
      btnPlay.textContent = isPlaying ? 'Pause' : 'Play';
      btnPlay.classList.toggle('active', isPlaying);
      btnSpeed.textContent = isFast ? 'Slow' : 'Fast';
      btnSpeed.classList.toggle('active', isFast);
    };

    btnPlay.addEventListener('click', () => {
      const playing = model.togglePlay();
      btnPlay.textContent = playing ? 'Pause' : 'Play';
      btnPlay.classList.toggle('active', playing);
    });

    btnSpeed.addEventListener('click', () => {
      const fast = model.toggleSpeed();
      btnSpeed.textContent = fast ? 'Slow' : 'Fast';
      btnSpeed.classList.toggle('active', fast);
    });

    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch((err) => {
          console.error(`Error attempting to enable fullscreen: ${err.message}`);
        });
        btnFullscreen.classList.add('active');
        btnFullscreen.textContent = 'Exit FullScreen';
      } else {
        document.exitFullscreen();
        btnFullscreen.classList.remove('active');
        btnFullscreen.textContent = 'FullScreen';
      }
    });
  </script>
</body>

</html>
