<html lang="fr">

<head>

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-dark);
            overflow: hidden;
            /* Empêche le scroll global */
            font-family: sans-serif;
        }

        #chart-container {
            width: 100%;
            height: 100%;
            top: 0;
            position: relative;
        }

        /* Styles de base pour le graphique TimeSeriesPlot */
        .axis line,
        .axis path {
            stroke: #444;
        }

        .axis text {
            fill: #999;
            font-size: 10px;
        }

        .line {
            fill: none;
            stroke-width: 0.8px;
        }

        .line-mv {
            stroke-width: 0.6px;
            stroke-dasharray: 2, 3;
        }

        .ma-slider-container-hovered .line-mv {
            stroke-width: 3px !important;
        }

        #chart-container {
            padding-top: 8px;
            padding-right: 0px;
        }

        .legend {
            font-size: 11px;
            fill: #eeeeee;
        }

        .tooltip {
            color: white;
            fill: white;
            text-align: center;
            line-height: 16px;
            cursor: help;
        }

        .focus text,
        .legend text,
        .axis-label,
        .hover-date,
        .hover-value,
        .info-text {
            font-weight: bold;
            text-shadow: 1px 0px 1px #333, -1px 0px 1px #333, 0px 1px 1px #333, 0px -1px 1px #333, 1px 1px 1px #333, -1px -1px 1px #333, 1px -1px 1px #333, -1px 1px 1px #333, 2px 0px 2px #333, -2px 0px 2px #333, 0px 2px 2px #333, 0px -2px 2px #333, 2px 2px 2px #333, -2px -2px 2px #333, 2px -2px 2px #333, -2px 2px 2px #333;
        }

        /* Styles pour le bouton Fullscreen */
        #fs-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #ccc;
            padding: 3px 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #fs-btn:hover {
            background: #333;
            color: #fff;
        }

        /* Styles pour les contrôles UI (Add Sensor) */
        #plot-ui-container {
            /* position: absolute; */
            top: 5px;
            left: 5px;
            z-index: 10;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            max-width: calc(100% - 100px);
            padding-right: 10px;
        }

        #sensor-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #ccc;
            padding: 3px 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            width: auto;
        }

        #sensor-select:hover {
            background: #333;
            color: #fff;
        }

        #active-sensors {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .active-sensor-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #ccc;
            padding: 3px 6px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .active-sensor-btn:hover,
        .active-sensor-btn.selected {
            background: #333;
            color: #fff;
            border-color: #777;
        }

        .active-sensor-btn .remove-cross {
            /* font-weight: bold; */
            font-size: 26px;
            line-height: 1;
            padding: 0px;
            margin: -6px -3px;
        }

        #sensor-stats-panel {
            position: relative;
            margin-top: -5px;
            z-index: 10;
            padding: 4px 15px;
            font-size: 13px;
            color: #fff;
            display: none;
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .stats-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            pointer-events: auto;
        }

        .stats-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.2;
        }

        .stats-value {
            font-weight: bold;
        }

        .stats-label {
            font-size: 0.8em;
            opacity: 0.8;
            margin-right: 4px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
            flex-shrink: 0
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--futuristic-cyan-dim);
            transition: .4s;
            border: 1px solid #fff;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: .4s
        }

        input:checked+.slider {
            background-color: var(--accent-blue)
        }

        input:focus+.slider {
            box-shadow: 0 0 1px var(--accent-blue)
        }

        input:checked+.slider:before {
            transform: translateX(18px)
        }

        .slider.round {
            border-radius: 34px
        }

        .slider.round:before {
            border-radius: 50%
        }
    </style>
</head>

    <button id="fs-btn"></button>
    <script>
        // Icônes SVG pour le bouton Fullscreen
        const iconMaximize = `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>`;
        const iconMinimize = `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>`;

        // Fonction pour mettre à jour l'icône du bouton
        function updateFsButton(isFullscreen) {
            const btn = document.getElementById('fs-btn');
            if (isFullscreen) {
                btn.innerHTML = iconMinimize + ' Quitter';
                btn.title = 'Quitter le mode plein écran';
            } else {
                btn.innerHTML = iconMaximize + ' Plein écran';
                btn.title = 'Passer en mode plein écran';
            }
        }

        // Fonction pour basculer le plein écran
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Erreur pour le plein écran: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.getElementById('fs-btn').addEventListener('click', toggleFullscreen);

        let resizeTimeout;

        document.addEventListener('DOMContentLoaded', async () => {

            updateFsButton(!!document.fullscreenElement);

            // 1. Récupération des paramètres URL
            const params = new URLSearchParams(window.location.search);
            const station = params.get('station');
            const sensorList = params.get('sensorList');

            const container = document.getElementById('chart-container');
            const sensorSelect = document.getElementById('sensor-select');
            const activeSensorsDiv = document.getElementById('active-sensors');

            if (!station || !sensorList) {
                container.innerHTML =
                    `<div style="color:red; text-align:center; padding-top:20%;">
                        Erreur: Paramètres 'station' ou 'sensorList' manquants.
                    </div>`;
                return;
            }

            let currentSensors = sensorList.split(',').filter(s => s.trim() !== '');
            let allStationSensors = [];
            let selectedSensor = null; // Capteur "verrouillé" par clic
            let sensorOffsets = {}; // Décalages temporels par capteur
            let currentStartDate = null;
            let currentEndDate = null;

            // Fonctions de conversion pour l'offset logarithmique (valeur de -500 à 500)
            function offsetSliderToMs(value) {
                const val = parseInt(value);
                if (val === 0) return 0;

                const sign = val > 0 ? 1 : -1;
                const absVal = Math.abs(val);

                const minMs = 5 * 60 * 1000; // 5 minutes
                const maxMs = 365 * 24 * 60 * 60 * 1000; // 365 jours

                const logMin = Math.log(minMs);
                const logMax = Math.log(maxMs);
                const rate = (absVal - 1) / (500 - 1);

                const ms = Math.exp(logMin + rate * (logMax - logMin));
                return sign * Math.round(ms / 60000) * 60000; // Arrondi à la minute
            }

            function msToOffsetSlider(ms) {
                if (!ms) return 0;
                const sign = ms > 0 ? 1 : -1;
                const absMs = Math.abs(ms);

                const minMs = 5 * 60 * 1000;
                const maxMs = 365 * 24 * 60 * 60 * 1000;

                if (absMs < minMs) return 0;

                const logMin = Math.log(minMs);
                const logMax = Math.log(maxMs);
                const logVal = Math.log(absMs);

                const rate = (logVal - logMin) / (logMax - logMin);
                const val = 1 + rate * (500 - 1);
                return sign * Math.round(val);
            }

            function formatOffset(offsetMs) {
                if (!offsetMs) return "Aucun décalage";

                const sign = offsetMs > 0 ? "+ " : "- ";
                const absMs = Math.abs(offsetMs);

                const minutes = Math.round(absMs / 60000);
                const days = Math.floor(minutes / (24 * 60));
                const hours = Math.floor((minutes % (24 * 60)) / 60);
                const mins = minutes % 60;

                const parts = [];
                if (days > 0) parts.push(`${days}j`);
                if (hours > 0) parts.push(`${hours}h`);
                if (mins > 0) parts.push(`${mins}m`);

                return sign + parts.join(' ');
            }

            // Fonction commune pour décaler l'offset du capteur sélectionné
            function shiftSensorOffset(direction) {
                if (!selectedSensor) return;

                const plotInstance = container.__current_plot_instance;
                if (!plotInstance) return;

                const domain = plotInstance.xScale.domain();
                const offset = sensorOffsets[selectedSensor] || 0;

                // Filtrer les données visibles du capteur pour estimer avgIntervalMs
                const visibleData = plotInstance.data.filter(d => {
                    const displayedDate = new Date(d.datetime.getTime() + offset);
                    return displayedDate >= domain[0] && displayedDate <= domain[1];
                });
                const dates = visibleData.map(d => d.datetime).filter(d => d instanceof Date && !isNaN(d));

                let avgIntervalMs = 300000; // 5 min par défaut
                if (window.plotMetadata && window.plotMetadata.intervalSeconds) {
                    avgIntervalMs = window.plotMetadata.intervalSeconds * 1000;
                } else if (dates.length > 1) {
                    avgIntervalMs = (dates[dates.length - 1] - dates[0]) / (dates.length - 1);
                }

                // Calculer le step en millisecondes (multiple de 300 secondes le plus proche de avgIntervalMs)
                let stepMs = Math.round(avgIntervalMs / 300000) * 300000;
                if (stepMs <= 0) stepMs = 300000;

                let newOffset = (sensorOffsets[selectedSensor] || 0) + direction * stepMs;

                // Limites de -1 an à +1 an
                const oneYearMs = 365 * 24 * 60 * 60 * 1000;
                newOffset = Math.max(-oneYearMs, Math.min(oneYearMs, newOffset));

                sensorOffsets[selectedSensor] = newOffset;

                // Mettre à jour l'instance graphique et redessiner
                plotInstance.sensorOffsets[selectedSensor] = newOffset;
                plotInstance.updateLines(false);

                // Rafraîchir le panneau des statistiques
                const color = plotInstance.colorScale(selectedSensor.replace(":", "_"));
                showStats(selectedSensor, color, plotInstance);
            }

            // Fonction utilitaire pour générer l'URL de données
            function getQueryUrl(sensorListStr) {
                return `/query/${station}/Raws/${sensorListStr}`;
            }

            // Fonction pour mettre à jour l'URL sans recharger la page
            function updateUrl() {
                // Mettre le capteur sélectionné en premier si présent
                let orderedSensors = [...currentSensors];
                if (selectedSensor && orderedSensors.includes(selectedSensor)) {
                    orderedSensors = [selectedSensor, ...orderedSensors.filter(s => s !== selectedSensor)];
                }

                const newSensorList = orderedSensors.join(',');
                const newUrl = `${window.location.pathname}?station=${station}&sensorList=${newSensorList}`;
                window.history.replaceState({}, '', newUrl);
                console.log('currentSensors ordered', newSensorList);

                // Synchronisation centralisée des métadonnées et de l'état du graphique
                const plotInstance = container.__current_plot_instance;
                if (plotInstance) {
                    plotInstance.sensorList = newSensorList;

                    // Synchronisation avec metadata.measurement
                    [plotInstance.metadata, window.plotMetadata].forEach(meta => {
                        if (meta && meta.measurement) {
                            Object.keys(meta.measurement).forEach(group => {
                                meta.measurement[group] = meta.measurement[group].filter(s => currentSensors.includes(s));
                            });
                        }
                    });
                }

                return newSensorList;
            }

            // Calculer et afficher les statistiques
            function showStats(sensor, color, plotInstance) {
                const currentStatsPanel = document.getElementById('sensor-stats-panel');
                if (!currentStatsPanel || !plotInstance || !plotInstance.data) return;

                // Ne considérer que la fenêtre visible (domaine de xScale)
                const domain = plotInstance.xScale.domain();
                const offset = sensorOffsets[sensor] || 0;

                // Filtrer les données visibles du capteur en prenant en compte son offset
                const visibleData = plotInstance.data.filter(d => {
                    const displayedDate = new Date(d.datetime.getTime() + offset);
                    return displayedDate >= domain[0] && displayedDate <= domain[1];
                });

                const values = visibleData
                    .map(d => d[sensor])
                    .filter(v => v !== null && v !== undefined && !isNaN(v));

                if (values.length === 0) {
                    currentStatsPanel.style.display = 'none';
                    return;
                }

                const min = d3.min(values); // Minimum
                const max = d3.max(values); // Maximum
                const avg = d3.mean(values); // Moyenne
                const sum = d3.sum(values); // Somme
                const variance = d3.variance(values); // 2ème moment central, moyenne des carrés des écarts à la moyenne
                const stdDev = d3.deviation(values) || 0; // Écart-type, racine carrée de la variance
                const p5 = d3.quantile(values, 0.05); // 5ème percentile
                const p20 = d3.quantile(values, 0.20); // 20ème percentile
                const median = d3.median(values); // 50ème percentile
                const p80 = d3.quantile(values, 0.80); // 80ème percentile
                const p95 = d3.quantile(values, 0.95); // 95ème percentile

                // Trouver l'unité
                let unit = '';
                let intervalSeconds = 0;
                if (window.plotMetadata && window.plotMetadata.toUserUnit && window.plotMetadata.toUserUnit[sensor]) {
                    unit = window.plotMetadata.toUserUnit[sensor].userUnit;
                    intervalSeconds = window.plotMetadata.intervalSeconds;
                }

                // Calcul de la durée de la fenêtre visible
                const durationMs = domain[1] - domain[0];
                const days = Math.floor(durationMs / (1000 * 60 * 60 * 24));
                const hours = Math.floor((durationMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const durationStr = `${days}j ${hours}h`;

                // Dates de début et fin de la fenêtre de zoom
                const formatDate = d3.timeFormat("%d/%m/%y %H:%M");
                const startDateStr = formatDate(domain[0]);
                const endDateStr = formatDate(domain[1]);

                // Intervalle
                const dates = visibleData.map(d => d.datetime).filter(d => d instanceof Date && !isNaN(d));
                let intervalStr = '';
                if (dates.length > 1) {
                    // Calcul de l'intervalle moyen
                    const avgIntervalMs = intervalSeconds ? intervalSeconds * 1000 : (dates[dates.length - 1] - dates[0]) / (dates.length - 1);
                    const totalMin = Math.round(avgIntervalMs / 60000);
                    const iDays = Math.floor(totalMin / (24 * 60));
                    const iHours = Math.floor((totalMin % (24 * 60)) / 60);
                    const iMin = totalMin % 60;

                    if (iDays > 0) intervalStr = `${iDays}j ${iHours}h:${iMin.toString().padStart(2, '0')}`;
                    else if (iHours > 0) intervalStr = `${iHours}h:${iMin.toString().padStart(2, '0')}`;
                    else intervalStr = `${totalMin}m`;
                }

                const isSelected = (sensor === selectedSensor);
                const offsetHtml = isSelected ? `
                     <!-- Séparateur vertical -->
                     <div style="width: 1px; height: 50px; background-color: #555; margin: 0 15px;"></div>
                     
                     <!-- Colonne Offset Slider (Agrandie, désactivée pour indicateur, avec boutons flèches) -->
                     <div class="stats-column" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 500px;">
                         <span style="font-size: 0.9em; font-weight: bold; margin-bottom: 5px; color: ${color};">Décalage temporel (touches &larr; / &rarr;) :</span>
                         <div style="display: flex; align-items: center; gap: 8px;">
                             <button id="offset-dec-btn" title="Reculer d'un pas" 
                                 style="background: rgba(255,255,255,0.1); border: 1px solid #555; color: #ccc; cursor: pointer; padding: 2px 8px; font-size: 12px; border-radius: 3px; outline: none; transition: background 0.2s;">
                                 &larr;
                             </button>
                             <input type="range" id="offset-slider" min="-500" max="500" value="${msToOffsetSlider(sensorOffsets[sensor] || 0)}" 
                                 style="cursor: default; width: 300px; height: 4px; accent-color: ${color}; opacity: 0.7;" disabled>
                             <button id="offset-inc-btn" title="Avancer d'un pas" 
                                 style="background: rgba(255,255,255,0.1); border: 1px solid #555; color: #ccc; cursor: pointer; padding: 2px 8px; font-size: 12px; border-radius: 3px; outline: none; transition: background 0.2s;">
                                 &rarr;
                             </button>
                         </div>
                         <span id="offset-val-label" style="font-size: 0.85em; margin: 5px; font-weight: bold; color: #ccc;">Aucun décalage</span>
                             <button id="reset-offset-btn" title="Réinitialiser le décalage à 0" 
                                 style="background: rgba(255,255,255,0.1); border: 1px solid #555; color: #ccc; cursor: pointer; padding: 2px 6px; font-size: 10px; border-radius: 3px; outline: none; transition: background 0.2s; margin-left: 5px;">
                                 Reset
                             </button>
                     </div>
                 ` : '';

                currentStatsPanel.innerHTML = `
                     <div class="stats-container">
                         <div class="stats-column" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                             <span style="font-size: 1.5em; line-height: 1;">
                                 <span style="font-size: 1.6em;">&larrb;</span> <b style="color: ${color};">${durationStr}</b> <span style="font-size: 1.6em;"> &rarrb;</span>
                             </span>
                             <span style="font-size: 0.75em; opacity: 0.7; margin-top: 2px; font-weight: normal;">
                                 Du ${startDateStr} au ${endDateStr}
                             </span>
                             <span style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;" title="Intervalle moyen entre 2 points">Step: <b style="color: ${color};">${intervalStr}</b></span>
                         </div>
 
                         <div class="stats-column">
                             <span title="Maximum"><span class="stats-label">Max.</span><b class="stats-value" style="color: ${color};">${max} ${unit}</b></span>
                             <span title="Moyenne"><span class="stats-label">Moy.</span><b class="stats-value" style="color: ${color};">${avg.toFixed(2)} ${unit}</b></span>
                             <span title="Minimum"><span class="stats-label">Min.</span><b class="stats-value" style="color: ${color};">${min} ${unit}</b></span>
                         </div>
                         <div class="stats-column" style="font-size: 0.9em;">
                             <span title="95ème percentile"><span class="stats-label">P.95</span><b class="stats-value" style="color: ${color};">${p95.toFixed(2)}${unit}</b> <span style='font-size:1.5em'>&#8679;</span></span>
                             <span title="80ème percentile"><span class="stats-label">P.80</span><b class="stats-value" style="color: ${color};">${p80.toFixed(2)}${unit}</b> <span style='font-size:1.5em'>&#8673;</span></span>
                             <span title="50ème percentile"><span class="stats-label">Méd.</span><b class="stats-value" style="color: ${color};">${median.toFixed(2)}${unit}</b> <span style='font-size:1.5em'>&#8596;</span></span>
                             <span title="20ème percentile"><span class="stats-label">P.20</span><b class="stats-value" style="color: ${color};">${p20.toFixed(2)}${unit}</b> <span style='font-size:1.5em'>&#8675;</span></span>
                             <span title="5ème percentile"><span class="stats-label">P.05</span><b class="stats-value" style="color: ${color};">${p5.toFixed(2)}${unit}</b> <span style='font-size:1.5em'>&#8681;</span></span>
                         </div>` +
                    (sensor.startsWith('rain:') ?
                        `<div class="stats-column">
                             <span title="Cumul"><span style='font-size:1.2em'>&sum;</span> <b class="stats-value" style="color: ${color};">${sum.toFixed(1)} ${unit}</b></span>
                         </div>` :
                        `<div class="stats-column">
                             <span title="Écart-type, racine carrée de la variance"><span style='font-size:1.4em'>&sigma;</span> <span class="stats-label">(stdDev)</span><b class="stats-value" style="color: ${color};">${stdDev.toFixed(2)} ${unit}</b></span>
                             <span title="Variance, moyenne des carrés des écarts à la moyenne (2ème moment central)"><span class="stats-label">Variance</span><b class="stats-value" style="color: ${color};">${variance.toFixed(2)} (${unit})²</b></span>
                         </div>`) +
                    offsetHtml +
                    `</div>
                 `;
                currentStatsPanel.style.display = 'block';

                if (isSelected) {
                    const offsetValLabel = document.getElementById('offset-val-label');
                    const resetOffsetBtn = document.getElementById('reset-offset-btn');
                    const decBtn = document.getElementById('offset-dec-btn');
                    const incBtn = document.getElementById('offset-inc-btn');

                    if (offsetValLabel) {
                        offsetValLabel.textContent = formatOffset(sensorOffsets[sensor] || 0);
                    }

                    if (decBtn) {
                        decBtn.addEventListener('mouseenter', () => decBtn.style.background = 'rgba(255,255,255,0.25)');
                        decBtn.addEventListener('mouseleave', () => decBtn.style.background = 'rgba(255,255,255,0.1)');
                        decBtn.addEventListener('click', () => {
                            shiftSensorOffset(-1);
                        });
                    }

                    if (incBtn) {
                        incBtn.addEventListener('mouseenter', () => incBtn.style.background = 'rgba(255,255,255,0.25)');
                        incBtn.addEventListener('mouseleave', () => incBtn.style.background = 'rgba(255,255,255,0.1)');
                        incBtn.addEventListener('click', () => {
                            shiftSensorOffset(1);
                        });
                    }

                    if (resetOffsetBtn) {
                        resetOffsetBtn.addEventListener('mouseenter', () => resetOffsetBtn.style.background = 'rgba(255,255,255,0.25)');
                        resetOffsetBtn.addEventListener('mouseleave', () => resetOffsetBtn.style.background = 'rgba(255,255,255,0.1)');
                        resetOffsetBtn.addEventListener('click', () => {
                            sensorOffsets[sensor] = 0;
                            if (plotInstance) {
                                plotInstance.sensorOffsets[sensor] = 0;
                                plotInstance.updateLines(false);
                            }
                            showStats(sensor, color, plotInstance);
                        });
                    }
                }
            }

            function hideStats() {
                // Si un capteur est sélectionné, on restaure ses stats au lieu de cacher
                if (selectedSensor) {
                    const sensorId = selectedSensor.replace(":", "_");
                    const plotInstance = container.__current_plot_instance;
                    if (plotInstance) {
                        const color = plotInstance.colorScale(sensorId);
                        showStats(selectedSensor, color, plotInstance);
                        return;
                    }
                }
                const currentStatsPanel = document.getElementById('sensor-stats-panel');
                if (currentStatsPanel) currentStatsPanel.style.display = 'none';
            }

            // Rendre l'interface des capteurs (dropdown et boutons)
            function renderSensorUI() {
                // Remplir le dropdown (trié par ordre alphabétique)
                sensorSelect.innerHTML = '<option value="" disabled selected>Add Sensor :</option>';
                [...allStationSensors].sort((a, b) => a.localeCompare(b)).forEach(sensor => {
                    if (!currentSensors.includes(sensor)) {
                        const option = document.createElement('option');
                        option.value = sensor;
                        option.textContent = sensor;
                        sensorSelect.appendChild(option);
                    }
                });

                // Remplir les boutons actifs
                // On conserve uniquement le sensor-select et on ajoute les boutons avant
                const existingBtns = activeSensorsDiv.querySelectorAll('.active-sensor-btn');
                existingBtns.forEach(btn => btn.remove());

                currentSensors.forEach(sensor => {
                    const btn = document.createElement('div');
                    btn.className = 'active-sensor-btn';
                    if (sensor === selectedSensor) btn.classList.add('selected');
                    btn.textContent = sensor;

                    // Couleur du capteur (depuis l'instance courante si dispo)
                    const sensorId = sensor.replace(":", "_");
                    let color = '#ccc'; // default
                    const plotInstance = container.__current_plot_instance;
                    if (plotInstance && plotInstance.colorScale) {
                        color = plotInstance.colorScale(sensorId);
                    }

                    const cross = document.createElement('span');
                    cross.className = 'remove-cross';
                    cross.innerHTML = '&times;';
                    cross.style.color = color;
                    cross.title = `Retirer ${sensor}`;

                    btn.appendChild(cross);

                    // Sélection du capteur au clic
                    btn.addEventListener('click', () => {
                        if (selectedSensor === sensor) {
                            selectedSensor = null; // Déselection
                        } else {
                            selectedSensor = sensor;
                        }
                        updateUrl(); // Mettre à jour l'ordre dans l'URL
                        renderSensorUI();
                        // Forcer la mise en évidence
                        if (plotInstance) {
                            plotInstance.highlightSensor(selectedSensor);
                            if (selectedSensor) {
                                showStats(selectedSensor, color, plotInstance);
                            } else {
                                hideStats();
                            }
                        }
                    });

                    // Supprimer le capteur
                    cross.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (selectedSensor === sensor) selectedSensor = null;
                        currentSensors = currentSensors.filter(s => s !== sensor);

                        // Retirer les lignes correspondantes du DOM
                        const plotInstance = container.__current_plot_instance;
                        if (plotInstance && plotInstance.g) {
                            plotInstance.g.selectAll(`[class*="line-${sensorId}"]`).remove();
                            // Restaurer l'opacité des lignes restantes
                            plotInstance.highlightSensor(selectedSensor);
                        }

                        updateUrl(); // Centralise maintenant la sync metadata

                        // Si c'est le dernier capteur, on peut afficher un message
                        if (currentSensors.length === 0) {
                            container.innerHTML = `<div id="sensor-stats-panel"></div><div style="color:white; text-align:center; padding-top:20%;">Aucun capteur sélectionné.</div>`;
                        }

                        hideStats();
                        renderSensorUI();
                    });

                    // Hover handler pour la surbrillance
                    btn.addEventListener('mouseenter', () => {
                        const plotInstance = container.__current_plot_instance;
                        if (plotInstance) {
                            plotInstance.highlightSensor(sensor);
                            showStats(sensor, color, plotInstance);
                        }
                    });

                    btn.addEventListener('mouseleave', () => {
                        const plotInstance = container.__current_plot_instance;
                        if (plotInstance) {
                            plotInstance.highlightSensor(selectedSensor);
                            if (selectedSensor) {
                                const selId = selectedSensor.replace(":", "_");
                                showStats(selectedSensor, plotInstance.colorScale(selId), plotInstance);
                            } else {
                                hideStats();
                            }
                        }
                    });

                    activeSensorsDiv.insertBefore(btn, sensorSelect);
                });
            }

            // Gestionnaire dropdown d'ajout
            sensorSelect.addEventListener('change', async (e) => {
                const selectedSensor = e.target.value;
                if (selectedSensor && !currentSensors.includes(selectedSensor)) {
                    currentSensors.push(selectedSensor);
                    const newSensorStr = updateUrl();
                    const dataUrl = getQueryUrl(newSensorStr);

                    // Conserver la fenêtre de date (zoom temporel) si elle existe déjà dans l'instance
                    const plotInstance = container.__current_plot_instance;
                    let prevZoomDomain = null;
                    if (plotInstance && plotInstance.xScale) {
                        prevZoomDomain = plotInstance.xScale.domain();
                    }

                    container.innerHTML = ''; // Clear pour le spinner ou re-draw
                    await drawChart(dataUrl);

                    const newPlotInstance = container.__current_plot_instance;
                    if (newPlotInstance && prevZoomDomain) {
                        newPlotInstance.xScale.domain(prevZoomDomain);
                        const filteredData = newPlotInstance.data.filter(d =>
                            d.datetime >= prevZoomDomain[0] && d.datetime <= prevZoomDomain[1]
                        );
                        if (filteredData.length > 0) {
                            newPlotInstance.updateYDomains(filteredData);
                        }
                        newPlotInstance.updateGradients();
                        newPlotInstance.updateAxes(0);
                        newPlotInstance.createNowLine();
                        newPlotInstance.updateLines(false);
                    }
                    renderSensorUI();
                }
            });

            // Gestionnaire Slider Historique
            const historySlider = document.getElementById('history-slider');
            const historySliderLabel = document.getElementById('history-slider-label');

            const sliderLabels = [
                "1 Jour",
                "1 Semaine",
                "1 Mois",
                "3 Mois",
                "6 Mois",
                "1 An",
                "3 Ans",
                "10 Ans",
                "Complet"
            ];

            function setSliderRange(value) {
                const today = new Date();

                const end = new Date(today);
                end.setDate(today.getDate() + 14); // Fin = Aujourd'hui + 14 jours

                const start = new Date(today); // Début = Aujourd'hui - Durée
                switch (parseInt(value)) {
                    case 0:
                        start.setDate(today.getDate() - 1);
                        break;
                    case 1:
                        start.setDate(today.getDate() - 7);
                        break;
                    case 2:
                        start.setMonth(today.getMonth() - 1);
                        break;
                    case 3:
                        start.setMonth(today.getMonth() - 3);
                        break;
                    case 4:
                        start.setMonth(today.getMonth() - 6);
                        break;
                    case 5:
                        start.setFullYear(today.getFullYear() - 1);
                        break;
                    case 6:
                        start.setFullYear(today.getFullYear() - 3);
                        break;
                    case 7:
                        start.setFullYear(today.getFullYear() - 10);
                        break;
                    case 8:
                        currentStartDate = null;
                        currentEndDate = null;
                        return;
                }
                currentStartDate = start.toISOString().split('T')[0];
                currentEndDate = end.toISOString().split('T')[0];
            }

            // Charger la valeur sauvegardée dans le localStorage si présente
            const savedSliderValue = localStorage.getItem('historySliderValue');
            const initialSliderVal = savedSliderValue !== null ? parseInt(savedSliderValue) : 5; // 5 = 1 An par défaut
            historySlider.value = initialSliderVal;
            setSliderRange(initialSliderVal);

            historySliderLabel.textContent = `${sliderLabels[historySlider.value]}`;

            historySlider.addEventListener('input', async (e) => {
                const val = parseInt(e.target.value);
                historySliderLabel.textContent = `${sliderLabels[val]}`;
                localStorage.setItem('historySliderValue', val); // Sauvegarder la valeur
                setSliderRange(val);

                container.innerHTML = '';
                initialDataUrl = getQueryUrl(currentSensors.join(','));
                await drawChart(initialDataUrl);
                renderSensorUI();
            });

            // Gérer le changement de valeur avec la roulette de la souris
            historySlider.addEventListener('wheel', (e) => {
                e.preventDefault();
                const direction = e.deltaY < 0 ? 1 : -1;
                let newVal = parseInt(historySlider.value) + direction;
                newVal = Math.max(parseInt(historySlider.min), Math.min(parseInt(historySlider.max), newVal));
                if (newVal !== parseInt(historySlider.value)) {
                    historySlider.value = newVal;
                    historySlider.dispatchEvent(new Event('input'));
                }
            });

            // Gérer le décalage de l'offset au clavier (flèches gauche et droite) pour le capteur sélectionné
            document.addEventListener('keydown', (e) => {
                if (!selectedSensor) return;

                // Ne pas intercepter les touches si l'utilisateur saisit du texte dans un autre champ actif
                if (e.target.tagName === 'INPUT' && !e.target.disabled) {
                    return;
                }
                if (e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
                    return;
                }

                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    const direction = e.key === 'ArrowRight' ? 1 : -1;
                    shiftSensorOffset(direction);
                }
            });

            // Récupérer la liste complète des capteurs pour la station
            async function loadAllSensors() {
                try {
                    // API query base pour récupérer metadata, sur une très courte durée ou pas de donnée
                    // On peut appeler Raws avec * ou juste la racine pour l'instant
                    // On utilise queryManager
                    const metaUrl = `/query/${station}`;
                    const res = await queryManager.query(metaUrl, { cacheDuration: 10 * 60 * 1000 });
                    if (res && res.metadata && res.metadata.sensor) {
                        allStationSensors = res.metadata.sensor;
                        renderSensorUI(); // Nouveau: Rafraîchir l'UI une fois les capteurs chargés
                    }
                } catch (err) {
                    console.error("Erreur lors du chargement des capteurs:", err);
                }
            }


            // URL de l'API initiale
            let initialDataUrl = getQueryUrl(sensorList);
            console.log(`Chargement Série Temporelle pour : Station=${station}, Sensors=${sensorList}`);

            // Fonction centrale pour (re)tracer le graphique
            async function drawChart(url = null) {
                // Ajuster la largeur du conteneur à la fenêtre (le height reste géré par CSS/Plots.js)
                container.style.width = window.innerWidth + 'px';

                const targetUrl = url || initialDataUrl;

                // Propager selectedSensor et sensorOffsets au conteneur pour le constructeur de TimeSeriesPlot
                container.selectedSensor = selectedSensor;
                container.sensorOffsets = sensorOffsets;

                // Appel de mainPlots qui va vider le conteneur et recréer le SVG
                // Plots.js définit par défaut height=300, ce qui corrige le problème de hauteur.
                if (typeof mainPlots === 'function') {
                    await mainPlots(container, targetUrl, currentStartDate || '', currentEndDate || '');

                    const plotInstance = container.__current_plot_instance;
                    if (plotInstance) {
                        const restoreSelection = () => {
                            if (selectedSensor) {
                                const sensorId = selectedSensor.replace(":", "_");
                                const color = plotInstance.colorScale(sensorId);
                                showStats(selectedSensor, color, plotInstance);
                            } else {
                                hideStats();
                            }
                        };

                        plotInstance.onUpdate = restoreSelection;

                        // Restaurer immédiatement si un capteur est déjà sélectionné
                        if (selectedSensor) {
                            restoreSelection();
                        }
                    }

                    // S'assurer que le stats-panel est bien présent après le clear de mainPlots
                    if (!document.getElementById('sensor-stats-panel')) {
                        const newStatsPanel = document.createElement('div');
                        newStatsPanel.id = 'sensor-stats-panel';
                        container.appendChild(newStatsPanel);
                    }

                    // Mettre à jour l'UI après le chargement pour avoir les bonnes couleurs
                    renderSensorUI();
                } else {
                    container.innerHTML = `<div style="color:red; text-align:center; padding-top:20%;">
                        Erreur: mainPlots introuvable.
                    </div>`;
                }
            }

            // 2. Initialisation : Charger les capteurs et le graphe
            loadAllSensors();
            drawChart(initialDataUrl);

            // 3. Gestionnaire de redimensionnement (avec debounce pour éviter les appels multiples)
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const plotInstance = container.__current_plot_instance;
                    if (plotInstance && typeof plotInstance.resize === 'function') {
                        container.style.width = window.innerWidth + 'px';
                        plotInstance.resize();
                    } else {
                        const currentUrl = getQueryUrl(currentSensors.join(','));
                        drawChart(currentUrl);
                    }
                }, 200);
            });

            // 4. Gestionnaire spécifique pour le changement de plein écran
            document.addEventListener('fullscreenchange', () => {
                updateFsButton(!!document.fullscreenElement);
                // Petit délai pour s'assurer que le navigateur a fini la transition
                setTimeout(() => {
                    const plotInstance = container.__current_plot_instance;
                    if (plotInstance && typeof plotInstance.resize === 'function') {
                        container.style.width = window.innerWidth + 'px';
                        plotInstance.resize();
                    } else {
                        const currentUrl = getQueryUrl(currentSensors.join(','));
                        drawChart(currentUrl);
                    }
                }, 100);
            });

            // 5. Gestionnaire pour le slider horizontal logarithmique de movingAverage
            function getMaWindowMsFromSliderValue(value) {
                const val = parseInt(value);
                if (val === 0) return 0; // Off

                const minMs = 1 * 60 * 60 * 1000; // 1 heure
                const maxMs = 90 * 24 * 60 * 60 * 1000; // 90 jours

                const logMin = Math.log(minMs);
                const logMax = Math.log(maxMs);
                const rate = (val - 1) / (100 - 1);

                return Math.exp(logMin + rate * (logMax - logMin));
            }

            function formatMaWindow(ms) {
                if (!ms || ms <= 0) return "mAvg: Off";

                const hours = ms / (60 * 60 * 1000);
                if (hours < 24) {
                    return `mAvg: ${Math.round(hours)}h`;
                }

                const days = hours / 24;
                if (days < 7) {
                    return `mAvg: ${days.toFixed(1)}j`;
                }

                return `mAvg: ${Math.round(days)}j`;
            }

            const maSlider = document.getElementById('ma-slider');
            const maSliderLabel = document.getElementById('ma-slider-label');

            // Mettre à jour l'affichage initial du label
            maSliderLabel.textContent = formatMaWindow(getMaWindowMsFromSliderValue(maSlider.value));

            maSlider.addEventListener('input', (e) => {
                const ms = getMaWindowMsFromSliderValue(e.target.value);
                maSliderLabel.textContent = formatMaWindow(ms);

                const plotInstance = container.__current_plot_instance;
                if (plotInstance) {
                    plotInstance.movingAverageWindowMs = ms;
                    plotInstance.updateLines(false);
                }
            });

            // Gérer le changement de valeur avec la roulette de la souris
            maSlider.addEventListener('wheel', (e) => {
                e.preventDefault();
                const direction = e.deltaY < 0 ? 1 : -1;
                let newVal = parseInt(maSlider.value) + direction * 2; // pas de 2
                newVal = Math.max(parseInt(maSlider.min), Math.min(parseInt(maSlider.max), newVal));
                if (newVal !== parseInt(maSlider.value)) {
                    maSlider.value = newVal;
                    maSlider.dispatchEvent(new Event('input'));
                }
            });

            // Gérer le survol de ma-slider-container
            const maSliderContainer = document.querySelector('.ma-slider-container');
            if (maSliderContainer) {
                maSliderContainer.addEventListener('mouseenter', () => {
                    document.body.classList.add('ma-slider-container-hovered');
                });
                maSliderContainer.addEventListener('mouseleave', () => {
                    document.body.classList.remove('ma-slider-container-hovered');
                });
            }
        });
    </script>
</body>

</html>
